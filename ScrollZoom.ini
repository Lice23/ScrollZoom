[General]
; Zoom change per scroll tick
fStepSize=1.0
; Min zoom as ratio of max (0.5 = half of max magnification)
fMinZoomRatio=0.50
; Max zoom as ratio of scope's original max (1.0 = original max, 1.25 = 25% beyond)
fMaxZoomRatio=1.25
; Starting zoom: 0 = min, 1 = mid, 2 = max
iStartZoom=2
; Scopes below this magnification are ignored
fMinFovMult=2.0
; Toggle Zoom Key: default 0x02 (middle mouse button)
; On key press, either adds one step of zoom or, if it's at maxZoom, reverts to minZoom.
; https://learn.microsoft.com/en-us/windows/win32/inputdev/virtual-key-codes
iToggleKey=0x02
; Write detailed debug logs
bDebugLogging=0
; OMODs that disable scroll zoom (comma separated, Plugin:FormID format)
; Example: MyGunMod.esp:001234,AnotherMod.esl:000ABC
sExcludedOMODs=
